fp16_softmax_fwd:
  args: --op softmax --only torch_compile_softmax --metrics latency,compile_time
fp16_softmax_bwd:
  args: --op softmax --only torch_compile_softmax --bwd --metrics latency,compile_time
bf16_flex_attention_fwd:
  args: --op flex_attention --metrics latency,tflops --only compiled
bf16_flex_attention_bwd:
  args: --op flex_attention --metrics latency,tflops --only compiled
