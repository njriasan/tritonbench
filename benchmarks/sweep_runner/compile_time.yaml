# Run config file for nightly benchmark
# First, collect all ops and backends with tags "triton"
# Measure latency, flops, and speedup metrics in the best effort
# Some operators might not support flops or speedup metrics
run_configs:
  default:
    with_backwards: true
    tags:
      - triton
    metrics:
      - compile_time
    skip_tests:
      - test/test_gpu/skip_tests.yaml
    # only run one input per kernel
    extra_args: --num-inputs 1
# override some ops
# bf16_flex_attention_fwd/bwd: measure compiled version (pt2)
overrides:
  bf16_flex_attention_fwd:
    args: --op flex_attention --metrics latency,tflops --only compiled
  bf16_flex_attention_bwd:
    args: --op flex_attention --metrics latency,tflops --only compiled
