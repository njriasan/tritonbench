name: TritonBench Nightly
on:
  schedule:
    # Test nightly docker daily at 4 PM UTC
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        type: choice
        required: true
        description: 'Choose advanced testing options'
        default: 'periodic'
        options:
          - 'single'
          - 'abtest'
          - 'periodic'
      side_a_triton:
        default: 'triton-lang/triton'
        description: 'Side A Triton repo'
      side_a_commit:
        default: 'main'
        description: 'Side A Triton commit'
      side_b_triton:
        default: 'triton-lang/triton'
        description: 'Side B Triton repo (abtest only)'
      side_b_commit:
        default: 'main'
        description: 'Side B Triton commit (abtest only)'
      device:
        type: choice
        required: true
        description: 'Device to run benchmarks on'
        default: 'both'
        options:
          - 'mi350'
          - 'h100'
          - 'both'
  pull_request:
    paths:
      - benchmarks/nightly/**
      - .github/workflows/_linux-benchmark-*.yml
      - .github/workflows/nightly.yml

jobs:
  h100-triton-main-nightly-benchmark:
    uses: ./.github/workflows/_linux-benchmark-h100.yml
    if: ${{ (inputs.device || 'both') != 'mi350' }}
    with:
      test_type: ${{ inputs.test_type || 'periodic' }}
      benchmark_name: "nightly"
      venv_name: "triton-main"
      side_a_triton: ${{ inputs.side_a_triton }}
      side_a_commit: ${{ inputs.side_a_commit }}
      side_b_triton: ${{ inputs.side_b_triton }}
      side_b_commit: ${{ inputs.side_b_commit }}
    secrets:
      TRITONBENCH_SCRIBE_GRAPHQL_ACCESS_TOKEN: ${{ secrets.TRITONBENCH_SCRIBE_GRAPHQL_ACCESS_TOKEN }}
  h100-meta-triton-nightly-benchmark:
    uses: ./.github/workflows/_linux-benchmark-h100.yml
    if: ${{ inputs.test_type != 'abtest' && (inputs.device || 'both') != 'mi350' }}
    with:
      test_type: ${{ inputs.test_type || 'periodic' }}
      benchmark_name: "nightly"
      venv_name: "meta-triton"
    secrets:
      TRITONBENCH_SCRIBE_GRAPHQL_ACCESS_TOKEN: ${{ secrets.TRITONBENCH_SCRIBE_GRAPHQL_ACCESS_TOKEN }}
  mi350-triton-main-nightly-benchmark:
    uses: ./.github/workflows/_linux-benchmark-mi350.yml
    if: ${{ (inputs.device || 'both') != 'h100' }}
    with:
      test_type: ${{ inputs.test_type || 'periodic' }}
      benchmark_name: "nightly"
      venv_name: "triton-main"
      side_a_triton: ${{ inputs.side_a_triton }}
      side_a_commit: ${{ inputs.side_a_commit }}
      side_b_triton: ${{ inputs.side_b_triton }}
      side_b_commit: ${{ inputs.side_b_commit }}
    secrets:
      TRITONBENCH_SCRIBE_GRAPHQL_ACCESS_TOKEN: ${{ secrets.TRITONBENCH_SCRIBE_GRAPHQL_ACCESS_TOKEN }}
  mi350-meta-triton-nightly-benchmark:
    uses: ./.github/workflows/_linux-benchmark-mi350.yml
    if: ${{ inputs.test_type != 'abtest' && (inputs.device || 'both') != 'h100' }}
    with:
      test_type: ${{ inputs.test_type || 'periodic' }}
      benchmark_name: "nightly"
      venv_name: "meta-triton"
    secrets:
      TRITONBENCH_SCRIBE_GRAPHQL_ACCESS_TOKEN: ${{ secrets.TRITONBENCH_SCRIBE_GRAPHQL_ACCESS_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true
